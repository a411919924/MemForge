# MemForge Configuration

# ── Ingestion LLM ────────────────────────────────────────────
# Used for fact extraction and L0 summary generation
ingestion_llm:
  provider: openrouter
  model: google/gemini-3.1-flash-lite-preview
  api_key_env: OPENROUTER_API_KEY

# ── QA LLM ───────────────────────────────────────────────────
# Used for answering questions from retrieved context
qa_llm:
  provider: openrouter
  model: qwen/qwen3-max
  api_key_env: OPENROUTER_API_KEY

# ── Judge LLM ────────────────────────────────────────────────
# Used for LLM-as-judge evaluation (CORRECT/WRONG)
judge_llm:
  provider: openrouter
  model: qwen/qwen3-max
  api_key_env: OPENROUTER_API_KEY

# ── Embedding Provider ───────────────────────────────────────
embedding:
  provider: openrouter
  model: openai/text-embedding-3-small
  api_key_env: OPENROUTER_API_KEY
  dimensions: 768

# ── Storage ──────────────────────────────────────────────────
storage:
  path: ~/.memforge/memforge.db

# ── Ingestion Pipeline ───────────────────────────────────────
ingestion:
  window_size: 40
  window_overlap: 2
  dedup_threshold: 0.85

# ── Retrieval Engine ─────────────────────────────────────────
retrieval:
  top_k: 20
  channels:
    - semantic
    - bm25
    - graph
    - temporal
